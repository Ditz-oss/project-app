services:
  backend:
    build:
      context: .
      dockerfile: ./app/Dockerfile
    container_name: container-final
    image: image-final
    ports:
      - "3000:3000"
    environment:
      APP_PORT: ${APP_PORT}
      DB_HOST:  ${DB_HOST}
      DB_USER:  ${DB_USER}
      DB_PASSWORD:  ${DB_PASSWORD}
      DB_NAME:  ${DB_NAME}
    depends_on:
      - mysql
      # - redis

  mysql:
    image: mysql:8
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin-app
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql-db

  # redis:
  #   image: redis:alpine
  #   ports:
  #     - "6379:6379"

volumes:
  mysql-data: